version: "3"

tasks:
  build:
    desc: Build documentation
    cmds:
      - pnpm --dir docs-site install --frozen-lockfile
      - pnpm --dir docs-site build

  build:strict:
    desc: Build documentation (CI-equivalent; astro build fails on errors)
    cmds:
      - pnpm --dir docs-site install --frozen-lockfile
      - pnpm --dir docs-site build

  serve:
    desc: Serve documentation locally with live reload
    cmds:
      - pnpm --dir docs-site install
      - pnpm --dir docs-site dev

  generate:
    desc: Generate API reference documentation using alef
    cmds:
      - alef docs

  generate:check:
    desc: Validate API docs match generated output (CI mode)
    cmds:
      - alef docs
      - git diff --exit-code -- docs-site/src/content/docs/reference/

  lint:links:
    desc: Check links with lychee
    cmds:
      - lychee --offline docs-site/src/content/docs README.md

  lint:prose:
    desc: Lint prose with textlint
    cmds:
      - npx textlint 'docs-site/src/content/docs/**/*.{md,mdx}'

  snippets:validate:
    desc: Validate all snippets via `alef snippets` (syntax level)
    cmds:
      - alef snippets validate --snippets docs-site/src/snippets --level syntax --timeout 120 -j 4

  snippets:validate:lang:
    desc: "Validate snippets for one language (set LANG=dart|kotlin|swift|...)"
    cmds:
      - alef snippets validate --snippets docs-site/src/snippets --level syntax --languages {{.LANG}} --timeout 120 -j 4
    requires:
      vars: [LANG]

  snippets:list:
    desc: List all discovered snippets
    cmds:
      - alef snippets list --snippets docs-site/src/snippets

  snippets:gaps:
    desc: Report snippet coverage gaps (missing variants, unreferenced files, etc.)
    cmds:
      - alef snippets gaps --snippets docs-site/src/snippets --docs docs-site/src/content/docs --required-languages rust,python,typescript,go,ruby,php,java,csharp,elixir,r,c,swift,dart,kotlin,zig

  snippets:audit:
    desc: Run structural audit (frontmatter, fences, includes)
    cmds:
      - alef snippets audit --snippets docs-site/src/snippets --docs docs-site/src/content/docs
