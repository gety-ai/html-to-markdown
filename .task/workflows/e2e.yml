version: "3"

tasks:
  generate:
    internal: true
    desc: Generate all E2E tests from fixtures across all supported languages
    cmds:
      - alef e2e generate

  build:
    internal: true
    desc: Build all language bindings for E2E tests
    cmds:
      - alef build

  test:
    internal: true
    desc: Run all E2E tests across all supported languages
    cmds:
      - alef test --e2e

  all:
    internal: true
    desc: Build all bindings and run all E2E tests
    cmds:
      - task: build
      - task: test

  quick:
    internal: true
    desc: Run quick E2E tests (Rust only)
    cmds:
      - task: rust:e2e:test

  lint:
    internal: true
    desc: Lint all generated E2E test code
    cmds:
      - alef lint

  verify:
    internal: true
    desc: Full E2E pipeline - generate, lint, and test all suites
    cmds:
      - task: generate
      - task: lint
      - task: test
