[discovery]
exclude = [
    "**/*.freezed.dart",
    "**/*.g.dart",
    "**/*.jinja",
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    ".alef/**",
    "artifacts/**",
    "dist/**",
    "docs/assets/**",
    "docs/snippets/**",
    "fixtures/**",
    "node_modules/**",
    "readme_templates/**",
    "target/**",
    "templates/readme/**",
    "test_documents/**",
    "vendor/**",
    "**/Cargo.toml",
    "**/_generated/**",
    "**/coverage/**",
    "**/pkg/**",
    "**/.next/**",
    "**/*.min.js",
    "**/tsconfig*.json",
    "docs/demo/**",
    "docs-site/public/demo/html_to_markdown_wasm.js",
    "e2e/wasm/tests/**",
    "test_apps/wasm/tests/**",
    "crates/html-to-markdown-node/index.js",
    "**/Cargo.toml",
    "**/*_bridge_generated/**",
]

[lint.markdown.rumdl]
disable = ["MD012", "MD013", "MD024", "MD033", "MD036", "MD041", "MD046", "MD051", "MD076"]

[fmt.markdown.rumdl]
disable = ["MD012", "MD013", "MD024", "MD033", "MD036", "MD041", "MD046", "MD051", "MD076"]

[lint.python.ruff]
select = ["ALL"]
ignore = [
    "ANN401",
    "ASYNC109",
    "ASYNC110",
    "BLE001",
    "COM812",
    "D100",
    "D104",
    "D107",
    "D205",
    "E501",
    "EM",
    "FBT",
    "FIX",
    "ISC001",
    "PD011",
    "PGH003",
    "PLR2004",
    "PLW0603",
    "S104",
    "S110",
    "S603",
    "TD",
    "TRY",
]
mccabe_max_complexity = 15
pydocstyle_convention = "google"
pylint_max_args = 10
pylint_max_branches = 15
pylint_max_returns = 10

[lint.php.mago]
select = ["correctness", "security"]
ignore = ["strict-assertions", "use-specific-assertions", "no-redundant-variable", "sensitive-parameter"]
php_version = "8.2"

