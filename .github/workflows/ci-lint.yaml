name: CI Lint

on:
  push:
    branches: [main]
    paths:
      - ".pre-commit-config.yaml"
      - ".ai-rulez/**"
      - "**/*.rs"
      - "**/*.py"
      - "**/*.ts"
      - "**/*.rb"
      - "**/*.php"
      - "**/*.go"
      - "**/*.java"
      - "**/*.ex"
      - "**/*.exs"
      - "**/*.R"
      - "**/*.sh"
      - "**/*.toml"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.json"
      - "alef.toml"
      - ".github/workflows/ci-lint.yaml"
  pull_request:
    branches: [main]
    paths:
      - ".pre-commit-config.yaml"
      - ".ai-rulez/**"
      - "**/*.rs"
      - "**/*.py"
      - "**/*.ts"
      - "**/*.rb"
      - "**/*.php"
      - "**/*.go"
      - "**/*.java"
      - "**/*.ex"
      - "**/*.exs"
      - "**/*.R"
      - "**/*.sh"
      - "**/*.toml"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.json"
      - "alef.toml"
      - ".github/workflows/ci-lint.yaml"
  workflow_dispatch: {}

concurrency:
  group: ci-lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    uses: xberg-io/actions/.github/workflows/reusable-validate.yml@v1
    with:
      setup-rust: true
      setup-python: true
