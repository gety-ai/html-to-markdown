[package]
name = "html-to-markdown-r"
version = "3.5.0"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["html", "markdown", "converter"]
categories = ["text-processing"]

[lib]
crate-type = ["staticlib", "lib"]

[dependencies]
html-to-markdown-rs = { path = "../../../../crates/html-to-markdown", features = [
  "full",
  "metadata",
  "visitor",
  "serde",
  "inline-images",
] }
extendr-api = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
