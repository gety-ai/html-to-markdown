[package]
name = "html-to-markdown-r"
version = "3.8.1"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["converter", "html", "markdown"]
categories = []

[package.metadata.cargo-machete]
# Declared for the extendr binding surface but not referenced by the current
# generated wrapper.
ignored = ["async-trait"]

[lib]
crate-type = ["staticlib", "lib"]

[dependencies]
async-trait = "0.1"
extendr-api = "0.9"
html-to-markdown-rs = { version = "3.8.1", path = "../../../../crates/html-to-markdown", features = ["serde", "metadata", "visitor", "inline-images", "testkit"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
default = ["inline-images", "metadata", "testkit", "visitor"]
inline-images = ["html-to-markdown-rs/inline-images"]
metadata = ["html-to-markdown-rs/metadata"]
testkit = ["html-to-markdown-rs/testkit"]
visitor = ["html-to-markdown-rs/visitor"]
