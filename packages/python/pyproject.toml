[build-system]
build-backend = "maturin"
requires = ["maturin>=1,<2"]

[project]
name = "html-to-markdown"
version = "3.8.3"
description = "High-performance HTML to Markdown converter"
keywords = ["converter", "html", "markdown"]
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Na'aman Hirschfeld <naaman@xberg.io>" }]
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
urls.repository = "https://github.com/xberg-io/html-to-markdown"

[dependency-groups]
dev = ["pyrefly>=1.1.1", "ruff>=0.14.8"]

[tool.maturin]
profile = "release"
module-name = "html_to_markdown._html_to_markdown"
manifest-path = "../../crates/html-to-markdown-py/Cargo.toml"
features = ["pyo3/extension-module", "pyo3/abi3-py310"]
python-packages = ["html_to_markdown"]
sdist-include = ["crates/html-to-markdown"]

[tool.pyrefly]
python-version = "3.10"
preset = "strict"
[[tool.pyrefly.sub-config]]
matches = "**/api.py"
[tool.pyrefly.sub-config.errors]
bad-argument-type = false
bad-argument-count = false
bad-return = false
not-iterable = false
missing-attribute = false
