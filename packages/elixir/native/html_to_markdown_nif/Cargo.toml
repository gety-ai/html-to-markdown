[package]
name = "html_to_markdown_nif"
version = "3.6.12"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["converter", "html", "markdown"]
categories = []

[package.metadata.cargo-machete]
ignored = [
    "tokio",
    "async-trait",
    "alloc-no-stdlib",
    "alloc-stdlib",
    "brotli-decompressor",
]

[workspace]

[lib]
name = "html_to_markdown_nif"

crate-type = ["cdylib"]

[features]
default = [
    "config",
    "download",
    "inline-images",
    "metadata",
    "serde",
    "testkit",
    "visitor",
]
config = ["html-to-markdown-rs/config"]
download = ["html-to-markdown-rs/download"]
inline-images = ["html-to-markdown-rs/inline-images"]
metadata = ["html-to-markdown-rs/metadata"]
serde = ["html-to-markdown-rs/serde"]
testkit = ["html-to-markdown-rs/testkit"]
visitor = ["html-to-markdown-rs/visitor"]

[dependencies]
alloc-no-stdlib = "=2.0.4"
alloc-stdlib = "=0.2.2"
async-trait = "0.1"
brotli-decompressor = "=5.0.1"
html-to-markdown-rs = { version = "3.6.12", path = "../../../../crates/html-to-markdown", features = ["serde", "metadata", "visitor", "inline-images", "testkit"] }
rustler = "0.38"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(feature, values("config", "download", "inline-images", "metadata", "serde", "testkit", "visitor"))'] }
